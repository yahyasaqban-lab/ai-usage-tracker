name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-usage-tracker.txt
        pip install pytest pytest-cov
    
    - name: Run basic tests
      run: |
        python -c "print('🧪 Testing imports...')"
        python -c "import sqlite3; print('✅ SQLite3 available')"
        python -c "import fastapi; print('✅ FastAPI imported')"
        python -c "import requests; print('✅ Requests imported')"
        echo "✅ All dependencies available"
    
    - name: Test core module
      run: |
        python -c "
        import sys, os
        sys.path.insert(0, '.')
        
        # Import and test core tracker
        import importlib.util
        spec = importlib.util.spec_from_file_location('ai_usage_tracker', 'ai-usage-tracker.py')
        ai_usage_tracker = importlib.util.module_from_spec(spec)
        spec.loader.exec_module(ai_usage_tracker)
        
        print('✅ Core module loads successfully')
        
        # Test basic functionality
        tracker = ai_usage_tracker.AIUsageTracker('test.db')
        print('✅ Tracker initializes')
        
        # Test model pricing
        assert len(ai_usage_tracker.MODEL_PRICING) > 30
        print('✅ Model pricing data loaded')
        
        print('🎉 All tests passed!')
        "
    
    - name: Test example usage
      run: |
        python -c "
        import sys, os
        sys.path.insert(0, '.')
        
        # Run limited example without API server
        import importlib.util
        spec = importlib.util.spec_from_file_location('ai_usage_tracker', 'ai-usage-tracker.py')
        ai_usage_tracker = importlib.util.module_from_spec(spec)
        spec.loader.exec_module(ai_usage_tracker)
        
        # Test basic operations
        tracker = ai_usage_tracker.AIUsageTracker('test_example.db')
        
        # Add test subscription
        sub_id = tracker.add_subscription('Test Sub', 10.0, 30)
        print('✅ Subscription added:', sub_id)
        
        # Log test job
        job_id, result = tracker.log_job('Test Job', 'gpt-4o', 'test input', 'test output')
        print('✅ Job logged:', job_id, f'Cost: \${result[\"total_cost\"]:.6f}')
        
        # Check balance
        balance = tracker.get_credit_balance()
        print('✅ Balance check:', f'\${balance[\"remaining_credits\"]:.6f}')
        
        print('🎉 Example test completed!')
        "
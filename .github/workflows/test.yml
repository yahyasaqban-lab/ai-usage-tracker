name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-usage-tracker.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        python example_usage.py
        echo "✅ Example usage completed successfully"
    
    - name: Test API import
      run: |
        python -c "from ai_usage_tracker import AIUsageTracker; print('✅ Core module imports')"
        python -c "import ai_tracker_api; print('✅ API module imports')"
        python -c "import openclaw_usage_integration; print('✅ Integration module imports')"